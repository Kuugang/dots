device{
    name = elan1203:00-04f3:307a-touchpad
    sensitivity = -0.05
    natural_scroll = true
    accel_profile = "flat"
}



device {
    name = e-signal-usb-gaming-mouse
    accel_profile = flat
    natural_scroll = false
    sensitivity = -0.05
}



input{
    force_no_accel = false
    touchpad{
        scroll_factor = 0.5
    }
}
